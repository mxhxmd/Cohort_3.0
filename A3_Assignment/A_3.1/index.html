<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Art Work</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <header class="top-bar">
      <span class="see-all">See All</span>
    </header>
    <main class="gallery-section">
      <h2 class="section-title">Explore Art Work</h2>
      <div class="grid">
        
        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1517511620798-cec17d428bc0?auto=format&fit=crop&w=400&q=80" alt="Monocular" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">Monocular</span>
              <span class="card-stats">54.8k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=400&q=80" alt="Horns Mask" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">Horns Mask</span>
              <span class="card-stats">32.4k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1522030299812-856980ee9e41?auto=format&fit=crop&w=400&q=80" alt="Light Moon" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">Light Moon</span>
              <span class="card-stats">88.6k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1505909182942-e2f09aee3e89?auto=format&fit=crop&w=400&q=80" alt="Skull Wire" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">Skull Wire</span>
              <span class="card-stats">78.9k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

        <div class="card card--active">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?auto=format&fit=crop&w=400&q=80" alt="Spiderman" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">Spiderman</span>
              <span class="card-stats">24.8k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn bid-btn--active">Place Bid</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1608889825103-eb5ed706fc64?auto=format&fit=crop&w=400&q=80" alt="DeadPool" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">DeadPool</span>
              <span class="card-stats">59.7k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1531746790731-6c087fecd65a?auto=format&fit=crop&w=400&q=80" alt="White Eye" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">White Eye</span>
              <span class="card-stats">45.7k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

        <div class="card">
          <div class="card-img-wrap">
            <img src="https://images.unsplash.com/photo-1530103043960-ef38714abb15?auto=format&fit=crop&w=400&q=80" alt="Plastic Spinal" class="card-img">
          </div>
          <div class="card-footer">
            <div class="card-meta">
              <span class="card-name">Plastic Spinal</span>
              <span class="card-stats">98.6k <span class="heart">♡</span></span>
            </div>
            <button class="bid-btn">Place Bid</button>
          </div>
        </div>

      </div>
    </main>
    <div class="side-dot side-dot--left"></div>
    <div class="side-dot side-dot--right"></div>
  </div>
</body>
</html>
