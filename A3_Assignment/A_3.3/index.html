<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <nav class="navbar">
    <div class="logo">
      <span class="logo-squid">SQUID</span><br/>
      <span class="logo-game">GAME<span class="logo-plus">+</span></span>
    </div>
    
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#" class="active">Watch now</a></li>
      <li><a href="#">Actors</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    
    <div class="hamburger">
      <i class="fas fa-bars"></i>
    </div>
  </nav>

  <section class="hero">
    
    <div class="hero-content">
      <div class="hero-title">
        <h1>SQUID <span class="cyan-star">✦</span></h1>
        <h1>GAME <span class="pink-dash">—</span></h1>
      </div>

      <p class="hero-desc">
        Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br/>
        Season 1: 9 Episodes
      </p>

      <div class="hero-buttons">
        <a href="#" class="btn-primary">
          <i class="fas fa-play"></i> Play Now
        </a>
        <a href="#" class="btn-secondary">
          <i class="fas fa-film"></i> Watch Trailer
        </a>
      </div>
    </div>

    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1634193295627-1cdddf751ebf?auto=format&fit=crop&w=500&q=80" alt="Squid Game Guard">
    </div>

    <div class="social-icons">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
    </div>

  </section>

  <section class="thumbnails">
    
    <div class="thumb-card">
      <img src="https://images.unsplash.com/photo-1634195130430-2be61200b66a?auto=format&fit=crop&w=400&q=80" alt="Episode 1">
      <div class="thumb-overlay">
        <span class="play-btn-sm"><i class="fas fa-play"></i></span>
      </div>
    </div>

    <div class="thumb-card">
      <img src="https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?auto=format&fit=crop&w=400&q=80" alt="Episode 2">
      <div class="thumb-overlay">
        <span class="play-btn-sm"><i class="fas fa-play"></i></span>
      </div>
    </div>

    <div class="thumb-card">
      <img src="https://images.unsplash.com/photo-1634818451834-8b6eb063b45a?auto=format&fit=crop&w=400&q=80" alt="Episode 3">
      <div class="thumb-overlay">
        <span class="play-btn-sm"><i class="fas fa-play"></i></span>
      </div>
    </div>

  </section>

</body>
</html>
