<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">
      <span class="logo-squid">SQUID</span><br/>
      <span class="logo-game">GAME<span class="logo-plus">+</span></span>
    </div>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#" class="active">Watch now</a></li>
      <li><a href="#">Actors</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <div class="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">

    <!-- Left content -->
    <div class="hero-content">
      <div class="hero-title">
        <div class="title-row">
          <span class="bar"></span>
          <span class="word squid">SQUID</span>
          <span class="star cyan">✦</span>
        </div>
        <div class="title-row game-row">
          <span class="word game">GAME<span class="game-dash">—</span></span>
        </div>
        <span class="star yellow">✦</span>
      </div>

      <p class="hero-desc">
        Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br/>
        Season 1: 9 Episodes
      </p>

      <div class="hero-buttons">
        <a href="#" class="btn-primary">
          <span class="play-icon">▶</span> Play Now
        </a>
        <a href="#" class="btn-secondary">
          <span class="play-icon-sm">▷</span> Watch Trailer
        </a>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator">
      <div class="scroll-line"></div>
      <span class="scroll-text">SCROLL</span>
    </div>

    <!-- Hero image -->
    <div class="hero-image-wrap">
      <div class="hero-image-bg"></div>
      <div class="hero-figure">
        <div class="figure-placeholder">
          <div class="mask-shape">
            <div class="mask-inner-square"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- BG text -->
    <div class="bg-text">GAME</div>

    <!-- Vertical SQUID text -->
    <div class="vertical-text">SQUID</div>

    <!-- Social icons -->
    <div class="social-icons">
      <a href="#" class="social-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 01-3.14 1.53A4.48 4.48 0 0022.43 1a9 9 0 01-2.88 1.1A4.52 4.52 0 0016.11 0c-2.5 0-4.52 2.03-4.52 4.52 0 .35.04.7.11 1.03C7.69 5.37 4.07 3.58 1.64.9c-.39.67-.61 1.45-.61 2.28 0 1.57.8 2.95 2.02 3.76a4.5 4.5 0 01-2.05-.57v.06c0 2.19 1.56 4.02 3.63 4.43a4.55 4.55 0 01-2.04.08c.57 1.79 2.23 3.09 4.2 3.12A9.06 9.06 0 010 15.54a12.8 12.8 0 006.92 2.03c8.3 0 12.85-6.88 12.85-12.85 0-.2 0-.39-.01-.58A9.17 9.17 0 0023 3z"/></svg>
      </a>
      <a href="#" class="social-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.332 3.608 1.308.975.975 1.246 2.242 1.308 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.333 2.633-1.308 3.608-.975.975-2.242 1.246-3.608 1.308-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.333-3.608-1.308C2.495 19.483 2.224 18.216 2.162 16.85 2.104 15.584 2.092 15.204 2.092 12s.012-3.584.07-4.85c.062-1.366.333-2.633 1.308-3.608C4.445 2.567 5.712 2.296 7.078 2.234 8.344 2.176 8.724 2.163 12 2.163zm0-2.163C8.741 0 8.333.014 7.053.072 5.773.13 4.548.402 3.465 1.485 2.382 2.568 2.11 3.793 2.052 5.073.014 8.333 0 8.741 0 12c0 3.259.014 3.667.072 4.947.058 1.28.33 2.505 1.413 3.588 1.083 1.083 2.308 1.355 3.588 1.413C8.333 23.986 8.741 24 12 24c3.259 0 3.667-.014 4.947-.072 1.28-.058 2.505-.33 3.588-1.413 1.083-1.083 1.355-2.308 1.413-3.588.058-1.28.072-1.688.072-4.947 0-3.259-.014-3.667-.072-4.947-.058-1.28-.33-2.505-1.413-3.588C19.452.402 18.227.13 16.947.072 15.667.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zm0 10.162a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      </a>
      <a href="#" class="social-icon">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.932-1.956 1.886v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
      </a>
    </div>

  </section>

  <!-- THUMBNAILS -->
  <section class="thumbnails">
    <div class="thumb-card">
      <div class="thumb-img thumb1">
        <div class="thumb-overlay">
          <div class="thumb-guards">
            <div class="guard-mask circle"></div>
            <div class="guard-mask square"></div>
            <div class="guard-mask triangle"></div>
          </div>
          <div class="thumb-logo-small">SQUID<span>GAME</span></div>
        </div>
      </div>
      <div class="play-btn-sm">▶</div>
    </div>
    <div class="thumb-card">
      <div class="thumb-img thumb2">
        <div class="thumb-overlay thumb-center">
          <div class="gas-mask"></div>
        </div>
      </div>
      <div class="play-btn-sm">▶</div>
    </div>
    <div class="thumb-card">
      <div class="thumb-img thumb3">
        <div class="thumb-overlay">
          <div class="group-guards">
            <div class="g-mask triangle"></div>
            <div class="g-mask triangle big"></div>
          </div>
        </div>
      </div>
      <div class="play-btn-sm">▶</div>
    </div>
  </section>

</body>
</html>
