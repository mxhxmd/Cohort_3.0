<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ScaleX – Insights & Blogs</title>
        <link rel="stylesheet" href="style.css" />
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    </head>
    <body>
        <!-- NAV -->
        <nav class="nav">
            <div class="nav__logo">
                <svg width="26" height="22" viewBox="0 0 26 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 22L6.5 11L13 22H0Z" fill="white"/>
                    <path d="M6.5 0L19.5 22H13L6.5 11L0 22H0L6.5 0Z" fill="white" opacity="0.55"/>
                    <path d="M13 0L26 22H19.5L13 11V0Z" fill="white"/>
                </svg>
                <span class="nav__brand">ScaleX</span>
            </div>
            <ul class="nav__links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#" class="active">Blogs</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
            <a href="#" class="btn-cta">Get Started</a>
        </nav>
        <!-- HERO -->
        <header class="hero">
            <h1 class="hero__title">Insights &amp; Blogs</h1>
        </header>
        <!-- FILTERS -->
        <section class="filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Tech</button>
            <button class="filter-btn">SaaS</button>
            <button class="filter-btn">Marketing</button>
        </section>
        <!-- BLOG GRID -->
        <main class="blog-grid">
            <!-- Card 1 -->
            <article class="card">
                <div class="card__img-wrap">
                    <img
                        src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=700&q=80"
                        alt="Martini glass on red tiles"
                        class="card__img"
                        />
                </div>
                <div class="card__body">
                    <span class="tag tag--tech">Tech</span>
                    <h2 class="card__title">The Ultimate Guide To SaaS Marketing</h2>
                    <p class="card__date">May 23, 2025</p>
                </div>
            </article>
            <!-- Card 2 -->
            <article class="card">
                <div class="card__img-wrap">
                    <img
                        src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=700&q=80"
                        alt="Chair on orange background"
                        class="card__img"
                        />
                </div>
                <div class="card__body">
                    <span class="tag tag--saas">SaaS</span>
                    <h2 class="card__title">5 Key Trends In SaaS Growth For 2025</h2>
                    <p class="card__date">May 23, 2025</p>
                </div>
            </article>
            <!-- Card 3 -->
            <article class="card">
                <div class="card__img-wrap">
                    <img
                        src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=700&q=80"
                        alt="Orange cat looking up"
                        class="card__img"
                        />
                </div>
                <div class="card__body">
                    <span class="tag tag--marketing">Marketing</span>
                    <h2 class="card__title">How Data-Driven Strategies Are Important</h2>
                    <p class="card__date">May 23, 2025</p>
                </div>
            </article>
        </main>
    </body>
</html>
